# Render.com deployment configuration.
# Docs: https://render.com/docs/infrastructure-as-code
#
# IMPORTANT: You already have a Postgres database on Render. Connect it to the
# web service via the DATABASE_URL environment variable in the Render dashboard,
# not in this file (so the secret is not committed).
#
# Remember: Render's DATABASE_URL starts with 'postgres://', but SQLAlchemy +
# asyncpg wants 'postgresql+asyncpg://'. The app handles this conversion
# automatically in app/config.py.

services:
  - type: web
    name: lera-logistics
    runtime: python
    plan: starter                # $7/month
    region: frankfurt            # closest to Ukraine / DE
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -e .
      alembic upgrade head
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Secrets below must be set manually in the Render dashboard:
      # - DATABASE_URL          (link to your existing Postgres)
      # - APP_SECRET_KEY        (generate: python -c "import secrets; print(secrets.token_urlsafe(48))")
      # - LARDI_API_TOKEN
      # - ANTHROPIC_API_KEY
