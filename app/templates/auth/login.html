{% extends "base.html" %}
{% block title %}Вхід — TruckLink{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="text-3xl font-bold text-white">
        <span class="text-amber-400">▸</span> TruckLink
      </a>
      <p class="text-slate-400 mt-2 text-sm">Платформа для вантажних перевезень</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h1 class="text-2xl font-bold text-slate-900 mb-6">Увійти в акаунт</h1>

      {% if error %}
      <div class="mb-5 rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/auth/login" class="space-y-5">
        <input type="hidden" name="next" value="{{ next }}">

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="email" required autocomplete="email"
                 value="{{ email or '' }}"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
                 placeholder="you@company.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
                 placeholder="Ваш пароль">
        </div>

        <button type="submit"
                class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold
                       rounded-xl py-3 px-6 transition-colors text-sm">
          Увійти →
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Ще немає акаунту?
        <a href="/auth/register" class="text-amber-600 hover:underline font-medium">Зареєструватись</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
